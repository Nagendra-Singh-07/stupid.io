<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V3 Fusion: The Hyper-Cube — Nagendra Singh</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020205; --accent: #c8f04d; }
        body { background: var(--bg); color: #ffffff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        .ui-overlay { position: relative; z-index: 10; pointer-events: none; }
        .ui-overlay * { pointer-events: auto; }
        .hero-name { font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 800; line-height: 0.85; letter-spacing: -0.05em; }
        .btn-fusion {
            background: #ffffff; color: #000; padding: 1.2rem 3rem; border-radius: 4px;
            font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .btn-fusion:hover { background: var(--accent); transform: scale(1.05); box-shadow: 0 20px 40px rgba(200, 240, 77, 0.3); }
        .label-glow { text-shadow: 0 0 10px rgba(200, 240, 77, 0.5); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-overlay min-h-screen flex flex-col justify-between p-12 md:p-24">
        <!-- Brand Header -->
        <nav class="flex justify-between items-start">
            <div class="flex flex-col">
                <div class="font-extrabold text-2xl tracking-tighter mb-2">N.SINGH</div>
                <div class="text-[9px] tracking-[0.4em] uppercase opacity-40">Core Logic: Fusion v3.1</div>
            </div>
        </nav>

        <!-- Dynamic Content -->
        <div class="max-w-4xl">
            <div class="mb-8 flex items-center gap-4">
                <div class="w-12 h-[1px] bg-[#c8f04d]"></div>
                <div class="text-[10px] tracking-[0.5em] uppercase text-[#c8f04d] font-bold label-glow">Executive Intelligence Fabric</div>
            </div>
            <h1 class="hero-name mb-12" id="hero-title">
                THE<br><span class="opacity-20" style="-webkit-text-stroke: 1px #fff">HYPER-CUBE.</span>
            </h1>
            <p class="text-xl md:text-2xl font-light opacity-50 max-w-lg mb-12 leading-relaxed">
                Building the <span class="text-white">gravitational centers</span> of modern enterprise data architecture.
            </p>
            <div class="flex flex-wrap gap-6">
                <button class="btn-fusion">Enter the Core</button>
                <div class="flex items-center gap-4 ml-4">
                    <span class="w-2 h-2 rounded-full bg-[#c8f04d] animate-pulse"></span>
                    <span class="text-[10px] tracking-[0.3em] uppercase font-bold opacity-40">Now Streaming: Data Insights</span>
                </div>
            </div>
        </div>

        <!-- System Meta -->
        <div class="flex justify-between items-end text-[9px] tracking-[0.3em] uppercase font-bold opacity-30">
            <div>21.1702° N, 72.8311° E // SURAT // INDIA</div>
            <div class="flex gap-10">
                <span>Architecture</span>
                <span>Security</span>
                <span>Scale</span>
            </div>
        </div>
    </div>

    <script>
        // --- High-Fidelity 3D Fusion Engine ---
        let scene, camera, renderer, cubeGroup, glassCube, wireCube, rings = [];
        
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Studio Lighting
            const p1 = new THREE.PointLight(0xc8f04d, 4, 20); p1.position.set(5, 5, 5); scene.add(p1);
            const p2 = new THREE.PointLight(0x8b5cf6, 3, 20); p2.position.set(-5, -5, 5); scene.add(p2);
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));

            cubeGroup = new THREE.Group();
            cubeGroup.position.set(4, 0, 0); // Side placement

            // 1. The Smoked Glass Cube (External Shell)
            const glassGeo = new THREE.BoxGeometry(2.5, 2.5, 2.5);
            const glassMat = new THREE.MeshStandardMaterial({ 
                color: 0x111115, 
                metalness: 0.9, 
                roughness: 0.05, 
                transparent: true, 
                opacity: 0.4 
            });
            glassCube = new THREE.Mesh(glassGeo, glassMat);
            cubeGroup.add(glassCube);

            // 2. The Intelligence Core (Internal Wireframe)
            const wireGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const wireMat = new THREE.MeshBasicMaterial({ color: 0xc8f04d, wireframe: true, transparent: true, opacity: 0.6 });
            wireCube = new THREE.Mesh(wireGeo, wireMat);
            cubeGroup.add(wireCube);

            // 3. The Gyroscopic Saturn Rings
            const ringColors = [0xc8f04d, 0xffffff, 0x8b5cf6];
            for(let i=0; i<3; i++) {
                const rGeo = new THREE.TorusGeometry(2.8 + (i*0.5), 0.03, 16, 100);
                const rMat = new THREE.MeshBasicMaterial({ 
                    color: ringColors[i], 
                    transparent: true, 
                    opacity: 0.4 - (i*0.1) 
                });
                const ring = new THREE.Mesh(rGeo, rMat);
                // Different initial tilts for "Interesting" factor
                ring.rotation.x = Math.random() * Math.PI;
                ring.rotation.y = Math.random() * Math.PI;
                rings.push(ring);
                cubeGroup.add(ring);
            }

            scene.add(cubeGroup);
            camera.position.z = 10;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Core Logic
            cubeGroup.rotation.y += 0.003;
            wireCube.rotation.x -= 0.005;
            
            // Pulsing the Intelligence Core
            const pulse = 1 + Math.sin(Date.now() * 0.002) * 0.05;
            wireCube.scale.set(pulse, pulse, pulse);

            // Gyroscopic Rings
            rings.forEach((r, i) => {
                r.rotation.x += 0.005 * (i + 1);
                r.rotation.y += 0.003 * (i + 1);
            });

            // Floating Physics
            cubeGroup.position.y = Math.sin(Date.now() * 0.001) * 0.4;

            renderer.render(scene, camera);
        }

        // --- Interaction & Reveal ---
        window.onload = () => {
            init3D(); animate();
            gsap.from("#hero-title", { opacity: 0, y: 50, duration: 2, ease: "expo.out", delay: 0.5 });
            
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX - window.innerWidth / 2) * 0.0001;
                const y = (e.clientY - window.innerHeight / 2) * 0.0001;
                gsap.to(camera.position, { x: x * 8, y: -y * 8, duration: 2.5 });
                gsap.to(cubeGroup.rotation, { x: y * 5, z: x * 5, duration: 2 });
            });
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
