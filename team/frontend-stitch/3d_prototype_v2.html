<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Intelligence Core — Nagendra Singh</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #c8f04d;
            --purple: #8b5cf6;
            --blue: #3b82f6;
            --text: #ffffff;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            cursor: none; /* Custom cursor for that high-end feel */
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .clash { font-family: 'Clash Display', sans-serif; }
        
        /* Custom Cursor */
        #cursor {
            width: 20px; height: 20px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-difference: exclusion;
            transition: transform 0.1s ease;
        }

        .pillar-nav-item {
            position: relative;
            padding: 1rem 2rem;
            cursor: pointer;
            transition: all 0.4s;
        }
        .pillar-nav-item::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            width: 0; height: 2px;
            background: var(--accent);
            transition: all 0.4s;
            transform: translateX(-50%);
        }
        .pillar-nav-item.active::after { width: 100%; }
        .pillar-nav-item.active { color: var(--accent); }

        /* Smooth reveal animation */
        .reveal { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body>
    <div id="cursor"></div>

    <!-- 3D Background -->
    <div id="canvas-container"></div>

    <!-- System Overlay (Top Nav) -->
    <nav class="fixed top-0 w-full p-10 flex justify-between items-center z-50">
        <div class="clash text-2xl font-bold tracking-tighter">
            NAGENDRA <span class="text-[rgba(255,255,255,0.2)]">SINGH</span>
        </div>
        <div class="glass px-6 py-3 rounded-full flex gap-10 text-[10px] tracking-[0.3em] uppercase font-bold">
            <span class="hover:text-[#c8f04d] cursor-pointer transition-colors">Portfolio.v2</span>
            <span class="hover:text-[#c8f04d] cursor-pointer transition-colors">Contact</span>
        </div>
    </nav>

    <!-- Main Experience -->
    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center pt-40 px-6">
        
        <!-- Hero Section -->
        <div class="text-center max-w-5xl mb-32">
            <div class="reveal inline-block px-4 py-1 glass rounded-full text-[10px] tracking-[0.4em] uppercase text-[#c8f04d] mb-8">
                Data Architecture & Intelligence
            </div>
            <h1 class="reveal clash text-7xl md:text-[10rem] font-bold leading-[0.85] tracking-tighter mb-12">
                UNCOVERING<br>VALUE.
            </h1>
            
            <!-- Strategic Switcher -->
            <div class="reveal flex justify-center gap-4 md:gap-12 mt-20 border-t border-white/10 pt-10">
                <div onclick="switchExperience('Engineer')" class="pillar-nav-item active clash text-xl font-bold" id="nav-Engineer">ENGINEER</div>
                <div onclick="switchExperience('Analyst')" class="pillar-nav-item clash text-xl font-bold" id="nav-Analyst">ANALYST</div>
                <div onclick="switchExperience('Scientist')" class="pillar-nav-item clash text-xl font-bold" id="nav-Scientist">SCIENTIST</div>
            </div>
        </div>

        <!-- Project Display Grid -->
        <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 max-w-7xl pb-40">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <script>
        // 1. Data Definitions
        const projects = [
            { title: "Revenue Predictive Core", category: "Scientist", tags: ["XGBoost", "Python"], accent: "#3b82f6" },
            { title: "Persona Segmentation Engine", category: "Analyst", tags: ["K-Means", "RFM"], accent: "#8b5cf6" },
            { title: "Kafka Streaming Fabric", category: "Engineer", tags: ["Real-time", "Java"], accent: "#c8f04d" },
            { title: "Snowflake ETL Pipeline", category: "Engineer", tags: ["Airflow", "SQL"], accent: "#c8f04d" },
            { title: "BERT Sentiment Neural", category: "Scientist", tags: ["NLP", "PyTorch"], accent: "#3b82f6" }
        ];

        // 2. 3D Engine Setup (Stitch)
        let scene, camera, renderer, coreMesh, wireframe;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // The "Monolith" Core
            const geometry = new THREE.IcosahedronGeometry(2, 2);
            const material = new THREE.MeshNormalMaterial({ wireframe: false, transparent: true, opacity: 0.1 });
            coreMesh = new THREE.Mesh(geometry, material);
            
            const wireGeometry = new THREE.IcosahedronGeometry(2.05, 2);
            const wireMaterial = new THREE.MeshBasicMaterial({ color: 0xc8f04d, wireframe: true, transparent: true, opacity: 0.2 });
            wireframe = new THREE.Mesh(wireGeometry, wireMaterial);
            
            scene.add(coreMesh);
            scene.add(wireframe);
            camera.position.z = 6;
        }

        function animate() {
            requestAnimationFrame(animate);
            coreMesh.rotation.y += 0.005;
            wireframe.rotation.y -= 0.003;
            renderer.render(scene, camera);
        }

        // 3. Smooth Transitions (Stitch + GSAP)
        function switchExperience(pillar) {
            // Update UI
            document.querySelectorAll('.pillar-nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${pillar}`).classList.add('active');

            // Animate 3D Core
            let color = 0xc8f04d;
            let scale = 1;
            if(pillar === 'Analyst') { color = 0x8b5cf6; scale = 1.2; }
            if(pillar === 'Scientist') { color = 0x3b82f6; scale = 0.8; }

            gsap.to(wireframe.material.color, { r: (color >> 16 & 255) / 255, g: (color >> 8 & 255) / 255, b: (color & 255) / 255, duration: 1.5 });
            gsap.to(wireframe.scale, { x: scale, y: scale, z: scale, duration: 1.5, ease: "expo.out" });

            // Filter Projects
            renderProjects(pillar);
        }

        function renderProjects(filter) {
            const container = document.getElementById('projects-container');
            const filtered = projects.filter(p => p.category === filter);
            
            gsap.to(container, { opacity: 0, y: 20, duration: 0.3, onComplete: () => {
                container.innerHTML = filtered.map(p => `
                    <div class="glass p-10 rounded-[2rem] group cursor-pointer hover:border-[#c8f04d] transition-all">
                        <div class="flex justify-between mb-8">
                            <div class="text-[10px] tracking-widest opacity-40 uppercase">${p.category}</div>
                            <div class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-[#c8f04d] group-hover:text-black transition-all">
                                <svg width="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M7 17L17 7M7 7h10v10"/></svg>
                            </div>
                        </div>
                        <h3 class="clash text-2xl font-bold mb-6 leading-tight">${p.title}</h3>
                        <div class="flex gap-2">
                            ${p.tags.map(t => `<span class="text-[9px] border border-white/10 px-3 py-1 rounded-full opacity-40">${t}</span>`).join('')}
                        </div>
                    </div>
                `).join('');
                gsap.to(container, { opacity: 1, y: 0, duration: 0.8, ease: "power4.out", stagger: 0.1 });
            }});
        }

        // 4. Cursor Interaction
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.2 });
            // Move 3D Camera slightly
            const x = (e.clientX - window.innerWidth / 2) * 0.0005;
            const y = (e.clientY - window.innerHeight / 2) * 0.0005;
            gsap.to(camera.position, { x: x, y: -y, duration: 1 });
        });

        // 5. Initial Reveal
        window.onload = () => {
            init3D();
            animate();
            switchExperience('Engineer');
            gsap.to(".reveal", { opacity: 1, y: 0, duration: 1.5, stagger: 0.2, ease: "power4.out" });
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
