<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagendra Singh | Data Architect & Scientist</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♏</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }

        .hero-name {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.04em;
        }

        .nav-item {
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .nav-item:hover {
            opacity: 1;
        }

        /* 3D Button Style */
        .btn-3d {
            background: #ffffff;
            color: #000;
            padding: 1rem 2.5rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-3d:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15);
        }

        .btn-social {
            width: 44px;
            height: 44px;
            border-radius: 0.5rem;
            background: var(--glass);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: #ffffff;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
        }

        .scroll-indicator {
            width: 24px;
            height: 44px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            position: relative;
        }

        .scroll-indicator::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            width: 4px;
            height: 8px;
            background: #ffffff;
            border-radius: 2px;
            transform: translateX(-50%);
            animation: scroll-anim 2s infinite;
        }

        @keyframes scroll-anim {
            0% {
                transform: translate(-50%, 0);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, 20px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full p-10 flex justify-between items-center z-50">
        <div class="font-extrabold text-xl tracking-tighter">Nagendra Singh</div>
        <div class="flex items-center gap-8">
            <div class="hidden md:flex gap-10">
                <a href="#" class="nav-item">Experience</a>
                <a href="#" class="nav-item">Projects</a>
                <a href="#" class="nav-item">Contact</a>
            </div>
            <div class="glass-panel p-2 rounded-lg flex gap-4">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707" />
                </svg>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6 pt-20">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center max-w-7xl w-full">

            <!-- Hero Text -->
            <div class="flex flex-col items-center lg:items-start text-center lg:text-left">
                <div class="reveal text-sm font-medium opacity-60 mb-6">Hi, I am</div>
                <h1 class="reveal hero-name mb-6">
                    Nagendra<br>Singh
                </h1>
                <div class="reveal text-lg md:text-xl font-medium opacity-40 mb-12">
                    Data Engineer, Analyst & Scientist
                </div>

                <div class="reveal flex flex-col sm:flex-row items-center gap-4 mb-8">
                    <a href="resume.pdf" class="btn-3d">
                        <svg width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                            <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" />
                        </svg>
                        Download Resume
                    </a>
                </div>

                <div class="reveal flex gap-4">
                    <button
                        class="btn-3d !bg-transparent !text-white !border !border-white/10 !py-3 !px-6 !text-[10px]">Hire
                        Me</button>
                    <a href="#" class="btn-social">
                        <svg width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z" />
                            <rect x="2" y="9" width="4" height="12" />
                            <circle cx="4" cy="4" r="2" />
                        </svg>
                    </a>
                    <a href="#" class="btn-social">
                        <svg width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" />
                        </svg>
                    </a>
                </div>
            </div>

            <!-- 3D Visualization Placeholder Space (Interpreted from Screenshot) -->
            <div class="hidden lg:block h-[600px] relative">
                <!-- Three.js will inject complex interactive objects here -->
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="reveal mt-20">
            <div class="scroll-indicator"></div>
        </div>

    </main>

    <script>
        // 1. Scene Setup
        let scene, camera, renderer, particles, stars;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Dark Space Particles
            const starGeo = new THREE.BufferGeometry();
            const starCount = 4000;
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount * 3; i++) {
                starPos[i] = (Math.random() - 0.5) * 50;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff, transparent: true, opacity: 0.4 });
            stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // 3D Grid/Control Panel (Abstraction of the Screenshot's Device)
            const gridCount = 20;
            const gridGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const gridMat = new THREE.MeshNormalMaterial({ transparent: true, opacity: 0.1 });

            for (let i = 0; i < gridCount; i++) {
                const mesh = new THREE.Mesh(gridGeo, gridMat);
                mesh.position.set(
                    (Math.random() - 0.5) * 5 + 4, // Offset to the right
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5
                );
                mesh.rotation.x = Math.random() * Math.PI;
                scene.add(mesh);
            }

            camera.position.z = 8;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (stars) stars.rotation.y += 0.0003;
            renderer.render(scene, camera);
        }

        // 2. Interaction
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) * 0.0001;
            const y = (e.clientY - window.innerHeight / 2) * 0.0001;
            gsap.to(camera.position, { x: x * 20, y: -y * 20, duration: 2 });
        });

        // 3. GSAP Entry
        window.onload = () => {
            init3D();
            animate();
            gsap.to(".reveal", { opacity: 1, y: 0, duration: 1.5, stagger: 0.15, ease: "power4.out" });
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
